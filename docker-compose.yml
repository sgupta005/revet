services:
  postgres:
    image: pgvector/pgvector:pg18-trixie
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-shivam}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-shivam2005}
      POSTGRES_DB: ${POSTGRES_DB:-revet}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-shivam}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8.6.4
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
  redis_data:
